{% extends "base.html" %}

{% block content %}
    <h1>Log In</h1>
    <!--We use post instead of get because using get adds the form fields to the
    url, cluttering the address bar, whereas with post the form data is submitted
    in the body of the request-->
    <form action="" method="post" novalidate>
        <!--The following line of code generates a hidden field that includes a token
        that is used to protect the form against CSRF attacks. The SECRET_KEY
        variable needs to be defined in the Flask configuration for this to work-->
        {{ form.hidden_tag() }}
        <p>
            {{ form.username.label }}<br>
            {{ form.username(size=32) }}
        </p>
        <p>
            {{ form.password.label }}<br>
            {{ form.password(size=32) }}
        </p>
        <p>{{ form.remember_me() }}  {{ form.remember_me.label }}</p>
        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
